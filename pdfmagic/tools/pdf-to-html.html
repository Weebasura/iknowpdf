<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF to HTML — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-icon">⬡</span>I Know <span class="logo-accent">PDF</span></a>
    </div>
  </header>
  <div class="tool-hero">
    <a href="../index.html" class="back-link">← All Tools</a>
    <div class="tool-hero-icon">🌐</div>
    <h1>PDF to HTML</h1>
    <p>Convert PDF pages to an HTML file with embedded page images.</p>
  </div>

  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <span class="drop-cta">Select PDF</span>
    </div>
    <div class="options-card" id="opts" style="display:none">
      <h3>HTML Options</h3>
      <div class="option-group">
        <label>Render Scale</label>
        <div class="range-row">
          <input type="range" id="scale" min="1" max="3" value="1.5" step="0.5" />
          <span class="range-val" id="scaleVal">1.5x</span>
        </div>
      </div>
    </div>
    <button class="btn-process" id="btnConvert" disabled>🌐 Convert to HTML</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let currentFile = null;
    const dropZone = document.getElementById('dropZone');
    const btnConvert = document.getElementById('btnConvert');
    const workspace = document.getElementById('workspace');
    const scaleSlider = document.getElementById('scale');
    const scaleVal = document.getElementById('scaleVal');
    scaleSlider.addEventListener('input', () => scaleVal.textContent = scaleSlider.value + 'x');

    document.getElementById('fileInput').addEventListener('change', function() { if(this.files[0]) enable(this.files[0]); });
    setupDropZone(dropZone, files => { if(files[0]) enable(files[0]); });

    function enable(file) {
      currentFile = file;
      document.getElementById('opts').style.display = 'block';
      btnConvert.disabled = false;
      dropZone.querySelector('h3').textContent = file.name;
    }

    btnConvert.addEventListener('click', async () => {
      if (!currentFile) return;
      btnConvert.textContent = 'Converting…'; btnConvert.disabled = true;
      try {
        const scale = parseFloat(scaleSlider.value);
        const bytes = await currentFile.arrayBuffer();
        const pdfjs = await pdfjsLib.getDocument({ data: bytes }).promise;
        const pages = [];
        for (let i = 1; i <= pdfjs.numPages; i++) {
          const page = await pdfjs.getPage(i);
          const vp = page.getViewport({ scale });
          const canvas = document.createElement('canvas');
          canvas.width = vp.width; canvas.height = vp.height;
          await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
          pages.push({ dataUrl: canvas.toDataURL('image/jpeg', 0.85), w: vp.width, h: vp.height });
        }
        const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${currentFile.name}</title>
<style>
  body { background:#333; margin:0; padding:24px; display:flex; flex-direction:column; align-items:center; gap:16px; font-family:sans-serif; }
  .page { background:#fff; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
  .page img { display:block; max-width:100%; }
  .nav { color:#ccc; font-size:13px; }
</style>
</head>
<body>
<div class="nav">PDF converted with I Know PDF — ${pages.length} page(s)</div>
${pages.map((p, i) => `<div class="page"><img src="${p.dataUrl}" width="${p.w}" height="${p.h}" alt="Page ${i+1}" /></div>`).join('\n')}
</body>
</html>`;
        const blob = new Blob([html], {type:'text/html'});
        showResult(workspace, () => downloadBlob(blob, 'converted.html'), `✅ ${pages.length} page(s) converted!`, formatBytes(blob.size));
        showToast('Converted to HTML!');
      } catch(e) { showError(workspace, 'Error: ' + e.message); }
      btnConvert.textContent = '🌐 Convert to HTML'; btnConvert.disabled = false;
    });
  </script>
</body>
</html>
