<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delete Pages — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-icon">⬡</span>I Know <span class="logo-accent">PDF</span></a>
    </div>
  </header>
  <div class="tool-hero">
    <a href="../index.html" class="back-link">← All Tools</a>
    <div class="tool-hero-icon">🗑️</div>
    <h1>Delete Pages</h1>
    <p>Click pages to select them for deletion, then apply changes.</p>
  </div>

  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <p>or click to browse</p>
      <span class="drop-cta">Select PDF</span>
    </div>
    <div id="selInfo" style="display:none;margin-top:16px;color:var(--text-muted);font-size:14px;text-align:center"></div>
    <div class="pages-grid" id="pagesGrid"></div>
    <button class="btn-process" id="btnDelete" disabled>🗑️ Delete Selected Pages</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let currentFile = null, totalPages = 0, selected = new Set();
    const dropZone = document.getElementById('dropZone');
    const pagesGrid = document.getElementById('pagesGrid');
    const btnDelete = document.getElementById('btnDelete');
    const selInfo = document.getElementById('selInfo');
    const workspace = document.getElementById('workspace');

    document.getElementById('fileInput').addEventListener('change', function() { if(this.files[0]) loadFile(this.files[0]); });
    setupDropZone(dropZone, files => { if(files[0]) loadFile(files[0]); });

    async function loadFile(file) {
      currentFile = file;
      pagesGrid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">Rendering pages…</p>';
      const bytes = await file.arrayBuffer();
      const pdfjs = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;
      totalPages = pdfjs.numPages;
      pagesGrid.innerHTML = '';
      selected.clear();
      for (let i = 1; i <= totalPages; i++) {
        const page = await pdfjs.getPage(i);
        const vp = page.getViewport({ scale: 0.4 });
        const canvas = document.createElement('canvas');
        canvas.width = vp.width; canvas.height = vp.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
        const thumb = document.createElement('div');
        thumb.className = 'page-thumb';
        thumb.dataset.page = i;
        thumb.innerHTML = `<div class="check">✓</div>`;
        thumb.insertBefore(canvas, thumb.firstChild);
        thumb.insertAdjacentHTML('beforeend', `<div class="page-thumb-label">Page ${i}</div>`);
        thumb.addEventListener('click', () => togglePage(i, thumb));
        pagesGrid.appendChild(thumb);
      }
      selInfo.style.display = 'block';
      updateInfo();
    }

    function togglePage(i, el) {
      if (selected.has(i)) { selected.delete(i); el.classList.remove('selected'); }
      else { selected.add(i); el.classList.add('selected'); }
      updateInfo();
    }

    function updateInfo() {
      selInfo.textContent = selected.size > 0
        ? `${selected.size} page(s) selected for deletion`
        : 'Click pages to select them for deletion';
      btnDelete.disabled = selected.size === 0 || selected.size >= totalPages;
    }

    btnDelete.addEventListener('click', async () => {
      if (!currentFile || !selected.size) return;
      btnDelete.textContent = 'Processing…'; btnDelete.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
        const toDelete = Array.from(selected).sort((a,b) => b-a);
        toDelete.forEach(i => doc.removePage(i - 1));
        const out = await doc.save();
        const blob = new Blob([out], { type: 'application/pdf' });
        showResult(workspace, () => downloadBlob(blob, 'deleted-pages.pdf'),
          `✅ ${selected.size} page(s) deleted!`, `${doc.getPageCount()} pages remaining · ${formatBytes(blob.size)}`);
        showToast('Pages deleted!');
      } catch(e) { showError(workspace, 'Error: ' + e.message); }
      btnDelete.textContent = '🗑️ Delete Selected Pages';
      btnDelete.disabled = false;
    });
  </script>
</body>
</html>
