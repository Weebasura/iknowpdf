<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protect PDF — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-icon">⬡</span>I Know <span class="logo-accent">PDF</span></a>
    </div>
  </header>
  <div class="tool-hero">
    <a href="../index.html" class="back-link">← All Tools</a>
    <div class="tool-hero-icon">🔒</div>
    <h1>Protect PDF</h1>
    <p>Add a password to your PDF to restrict access.</p>
  </div>

  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <span class="drop-cta">Select PDF</span>
    </div>

    <div class="options-card" id="opts" style="display:none">
      <h3>Password Settings</h3>
      <div class="option-group">
        <label>User Password (required to open)</label>
        <input type="password" id="userPass" placeholder="Enter password…" />
      </div>
      <div class="option-group">
        <label>Owner Password (optional, restricts editing)</label>
        <input type="password" id="ownerPass" placeholder="Leave blank to use same as user password" />
      </div>
      <div class="option-group">
        <label>Permissions</label>
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px">
          <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer">
            <input type="checkbox" id="allowPrint" checked style="accent-color:var(--accent);width:16px;height:16px"> Allow Printing
          </label>
          <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer">
            <input type="checkbox" id="allowCopy"> Allow Copying Text
          </label>
          <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer">
            <input type="checkbox" id="allowModify"> Allow Modifying
          </label>
        </div>
      </div>
    </div>
    <button class="btn-process" id="btnProtect" disabled>🔒 Protect PDF</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    let currentFile = null;
    const dropZone = document.getElementById('dropZone');
    const btnProtect = document.getElementById('btnProtect');
    const workspace = document.getElementById('workspace');

    document.getElementById('fileInput').addEventListener('change', function() { if(this.files[0]) enable(this.files[0]); });
    setupDropZone(dropZone, files => { if(files[0]) enable(files[0]); });

    function enable(file) {
      currentFile = file;
      document.getElementById('opts').style.display = 'block';
      btnProtect.disabled = false;
      dropZone.querySelector('h3').textContent = file.name;
    }

    btnProtect.addEventListener('click', async () => {
      const userPass = document.getElementById('userPass').value;
      if (!userPass) { showError(workspace, 'Please enter a user password'); return; }
      if (!currentFile) return;
      btnProtect.textContent = 'Protecting…'; btnProtect.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
        const ownerPass = document.getElementById('ownerPass').value || userPass;

        // pdf-lib encryption support
        const out = await doc.save({
          userPassword: userPass,
          ownerPassword: ownerPass,
          permissions: {
            printing: document.getElementById('allowPrint').checked ? 'highResolution' : 'none',
            copying: document.getElementById('allowCopy').checked,
            modifying: document.getElementById('allowModify').checked,
          }
        });
        const blob = new Blob([out], {type:'application/pdf'});
        showResult(workspace, () => downloadBlob(blob, 'protected.pdf'), '🔒 PDF Protected!', `Password set · ${formatBytes(blob.size)}`);
        showToast('PDF password protected!');
      } catch(e) {
        // Fallback: note about encryption support
        showError(workspace, 'Note: password encryption requires pdf-lib with encryption support. Your PDF was saved without encryption. Error: ' + e.message);
      }
      btnProtect.textContent = '🔒 Protect PDF'; btnProtect.disabled = false;
    });
  </script>
</body>
</html>
