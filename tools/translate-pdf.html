<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translate PDF — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    <div class="tool-hero-icon">🌍</div>
    <h1>Translate PDF</h1>
    <p>Extract text from your PDF and translate it using AI into any language.</p>
  </div>
  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <span class="drop-cta">Select PDF</span>
    </div>
    <div class="options-card" id="opts" style="display:none">
      <h3>Translation Options</h3>
      <div class="option-group">
        <label>Translate to</label>
        <select id="targetLang">
          <option value="Hindi">Hindi (हिंदी)</option>
          <option value="English">English</option>
          <option value="French">French (Français)</option>
          <option value="Spanish">Spanish (Español)</option>
          <option value="German">German (Deutsch)</option>
          <option value="Arabic">Arabic (العربية)</option>
          <option value="Chinese">Chinese (中文)</option>
          <option value="Japanese">Japanese (日本語)</option>
          <option value="Portuguese">Portuguese (Português)</option>
          <option value="Russian">Russian (Русский)</option>
          <option value="Italian">Italian (Italiano)</option>
          <option value="Korean">Korean (한국어)</option>
          <option value="Bengali">Bengali (বাংলা)</option>
          <option value="Tamil">Tamil (தமிழ்)</option>
          <option value="Telugu">Telugu (తెలుగు)</option>
          <option value="Marathi">Marathi (मराठी)</option>
          <option value="Gujarati">Gujarati (ગુજરાતી)</option>
          <option value="Punjabi">Punjabi (ਪੰਜਾਬੀ)</option>
        </select>
      </div>
    </div>
    <button class="btn-process" id="btnTranslate" disabled>🌍 Translate PDF</button>
    <div id="transResult" style="display:none;margin-top:20px">
      <div class="options-card">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
          <span style="font-size:24px">🌍</span>
          <h3 style="margin:0">Translation</h3>
        </div>
        <div id="transText" style="font-size:15px;line-height:1.9;color:var(--text,#1a1a2e);white-space:pre-wrap;max-height:400px;overflow-y:auto"></div>
        <div style="display:flex;gap:12px;margin-top:16px;flex-wrap:wrap">
          <button class="btn-download" id="btnCopyTrans" style="background:var(--surface,#f7f8fc);color:var(--text,#333);border:1px solid var(--border,#e2e4ef)">📋 Copy</button>
          <button class="btn-download" id="btnDlTrans">⬇ Download .txt</button>
        </div>
      </div>
    </div>
    <div id="noApiMsg" class="options-card" style="display:none;margin-top:20px;border-color:#f5c88a;background:#fffbe8">
      <h3>⚠️ API Key Required</h3>
      <p style="font-size:14px;color:var(--text-mid,#555);margin-top:8px">Get a free API key from <a href="https://console.anthropic.com" target="_blank" style="color:#e8314a">console.anthropic.com</a></p>
      <div class="option-group" style="margin-top:12px">
        <label>Paste your API Key</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." />
      </div>
      <button class="btn-process" id="btnSaveKey" style="margin-top:12px">Save & Try Again</button>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let currentFile=null;
    const fileInput=document.getElementById('fileInput');
    const dropZone=document.getElementById('dropZone');
    const btnTranslate=document.getElementById('btnTranslate');
    const workspace=document.getElementById('workspace');

    fileInput.addEventListener('change',()=>{if(fileInput.files[0])enable(fileInput.files[0]);});
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f)enable(f);});
    function enable(f){currentFile=f;document.getElementById('opts').style.display='block';btnTranslate.disabled=false;dropZone.querySelector('h3').textContent=f.name;}

    document.getElementById('btnSaveKey').addEventListener('click',()=>{
      const key=document.getElementById('apiKey').value.trim();
      if(key){localStorage.setItem('ikp_api_key',key);document.getElementById('noApiMsg').style.display='none';btnTranslate.click();}
    });

    btnTranslate.addEventListener('click', async ()=>{
      if(!currentFile)return;
      btnTranslate.textContent='Extracting…';btnTranslate.disabled=true;
      document.getElementById('transResult').style.display='none';
      document.getElementById('noApiMsg').style.display='none';
      try {
        const bytes=await currentFile.arrayBuffer();
        const pdf=await pdfjsLib.getDocument({data:bytes}).promise;
        let text='';
        for(let i=1;i<=Math.min(pdf.numPages,8);i++){
          const page=await pdf.getPage(i);
          const content=await page.getTextContent();
          text+=content.items.map(it=>it.str).join(' ')+'\n';
        }
        if(!text.trim()){showError(workspace,'No text found. Try OCR tool first.');btnTranslate.textContent='🌍 Translate PDF';btnTranslate.disabled=false;return;}

        const apiKey=localStorage.getItem('ikp_api_key');
        if(!apiKey){document.getElementById('noApiMsg').style.display='block';btnTranslate.textContent='🌍 Translate PDF';btnTranslate.disabled=false;return;}

        const lang=document.getElementById('targetLang').value;
        btnTranslate.textContent=`Translating to ${lang}…`;

        const response=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
          body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:4000,messages:[{role:'user',content:`Translate the following text to ${lang}. Only output the translation, nothing else:\n\n${text.substring(0,6000)}`}]})
        });

        if(!response.ok){
          const err=await response.json();
          if(err.error?.type==='authentication_error'){localStorage.removeItem('ikp_api_key');document.getElementById('noApiMsg').style.display='block';}
          else showError(workspace,'API error: '+(err.error?.message||'Unknown'));
          btnTranslate.textContent='🌍 Translate PDF';btnTranslate.disabled=false;
          return;
        }
        const data=await response.json();
        const translated=data.content[0].text;
        document.getElementById('transText').textContent=translated;
        document.getElementById('transResult').style.display='block';
        document.getElementById('btnCopyTrans').onclick=()=>{navigator.clipboard.writeText(translated);showToast('Copied!');};
        document.getElementById('btnDlTrans').onclick=()=>downloadBlob(new Blob([translated],{type:'text/plain'}),`translated-${lang}.txt`);
        showToast('Translation done!');
      }catch(e){showError(workspace,'Error: '+e.message);}
      btnTranslate.textContent='🌍 Translate PDF';btnTranslate.disabled=false;
    });
  </script>
</body>
</html>
