<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unlock PDF — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    
    <div class="tool-hero-icon">🔓</div>
    <h1>Unlock PDF</h1>
    <p>Remove password protection from a PDF you own. You must know the password.</p>
  </div>

  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your protected PDF here</h3>
      <span class="drop-cta">Select PDF</span>
    </div>

    <div class="options-card" id="opts" style="display:none">
      <h3>Enter Password</h3>
      <div class="option-group">
        <label>PDF Password</label>
        <input type="password" id="pdfPass" placeholder="Enter the PDF password…" />
      </div>
    </div>
    <button class="btn-process" id="btnUnlock" disabled>🔓 Unlock PDF</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    let currentFile = null;
    const dropZone = document.getElementById('dropZone');
    const btnUnlock = document.getElementById('btnUnlock');
    const workspace = document.getElementById('workspace');

    document.getElementById('fileInput').addEventListener('change', function() { if(this.files[0]) enable(this.files[0]); });
    setupDropZone(dropZone, files => { if(files[0]) enable(files[0]); });

    function enable(file) {
      currentFile = file;
      document.getElementById('opts').style.display = 'block';
      btnUnlock.disabled = false;
      dropZone.querySelector('h3').textContent = file.name;
    }

    btnUnlock.addEventListener('click', async () => {
      if (!currentFile) return;
      const pass = document.getElementById('pdfPass').value;
      btnUnlock.textContent = 'Unlocking…'; btnUnlock.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        // Try loading with password
        const doc = await PDFLib.PDFDocument.load(bytes, {
          ignoreEncryption: false,
          password: pass || undefined
        });
        // Re-save without encryption
        const out = await doc.save();
        const blob = new Blob([out], {type:'application/pdf'});
        showResult(workspace, () => downloadBlob(blob, 'unlocked.pdf'), '🔓 PDF Unlocked!', `Password removed · ${formatBytes(blob.size)}`);
        showToast('PDF unlocked!');
      } catch(e) {
        if (e.message && e.message.includes('password')) {
          showError(workspace, 'Incorrect password. Please try again.');
        } else {
          // Try with ignoreEncryption as fallback
          try {
            const bytes2 = await currentFile.arrayBuffer();
            const doc2 = await PDFLib.PDFDocument.load(bytes2, { ignoreEncryption: true });
            const out2 = await doc2.save();
            const blob2 = new Blob([out2], {type:'application/pdf'});
            showResult(workspace, () => downloadBlob(blob2, 'unlocked.pdf'), '🔓 Restrictions Removed!', formatBytes(blob2.size));
            showToast('PDF unlocked!');
          } catch(e2) {
            showError(workspace, 'Could not unlock this PDF: ' + e2.message);
          }
        }
      }
      btnUnlock.textContent = '🔓 Unlock PDF'; btnUnlock.disabled = false;
    });
  </script>
</body>
</html>
