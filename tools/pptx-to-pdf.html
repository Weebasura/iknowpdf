<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowerPoint to PDF — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    <div class="tool-hero-icon">📊</div>
    <h1>PowerPoint to PDF</h1>
    <p>Convert your .pptx presentation slides into a PDF document.</p>
  </div>
  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pptx,.ppt" />
      <div class="drop-icon">📊</div>
      <h3>Drop your PowerPoint file here</h3>
      <p>.pptx files supported</p>
      <span class="drop-cta">Select PowerPoint</span>
    </div>
    <button class="btn-process" id="btnConvert" disabled>📄 Convert to PDF</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    let currentFile = null;
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const btnConvert = document.getElementById('btnConvert');
    const workspace = document.getElementById('workspace');
    fileInput.addEventListener('change',()=>{if(fileInput.files[0]){currentFile=fileInput.files[0];btnConvert.disabled=false;dropZone.querySelector('h3').textContent=currentFile.name;}});
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f){currentFile=f;btnConvert.disabled=false;dropZone.querySelector('h3').textContent=f.name;}});

    btnConvert.addEventListener('click', async () => {
      if (!currentFile) return;
      btnConvert.textContent = 'Converting…'; btnConvert.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        const zip = await JSZip.loadAsync(bytes);
        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        const doc = await PDFDocument.create();
        const font = await doc.embedFont(StandardFonts.HelveticaBold);
        const bodyFont = await doc.embedFont(StandardFonts.Helvetica);

        // Extract slide XMLs
        const slideFiles = Object.keys(zip.files).filter(n => n.match(/ppt\/slides\/slide\d+\.xml$/)).sort((a,b)=>{
          const na = parseInt(a.match(/slide(\d+)/)[1]);
          const nb = parseInt(b.match(/slide(\d+)/)[1]);
          return na - nb;
        });

        for (let si = 0; si < slideFiles.length; si++) {
          const xml = await zip.files[slideFiles[si]].async('text');
          const parser = new DOMParser();
          const xmlDoc = parser.parseFromString(xml, 'text/xml');
          const texts = Array.from(xmlDoc.querySelectorAll('r t')).map(t=>t.textContent).filter(t=>t.trim());

          const page = doc.addPage([960, 540]);
          // Background
          page.drawRectangle({x:0,y:0,width:960,height:540,color:rgb(0.12,0.12,0.22)});
          // Slide number
          page.drawText(`Slide ${si+1}`, {x:20,y:510,size:10,font:bodyFont,color:rgb(0.5,0.5,0.6)});

          let y = 460;
          let isFirst = true;
          for (const text of texts.slice(0,20)) {
            if (!text.trim()) continue;
            const sz = isFirst ? 28 : 14;
            const f = isFirst ? font : bodyFont;
            const col = isFirst ? rgb(1,1,1) : rgb(0.8,0.8,0.85);
            // Simple word wrap
            const words = text.split(' ');
            let line = '';
            const maxW = 880;
            for (const word of words) {
              const test = line ? line+' '+word : word;
              if (f.widthOfTextAtSize(test, sz) > maxW && line) {
                if (y > 30) page.drawText(line, {x:40,y,size:sz,font:f,color:col});
                y -= sz * 1.4; line = word;
              } else line = test;
            }
            if (line && y > 30) page.drawText(line, {x:40,y,size:sz,font:f,color:col});
            y -= sz * 1.6;
            isFirst = false;
            if (y < 30) break;
          }
        }

        const out = await doc.save();
        const blob = new Blob([out],{type:'application/pdf'});
        showResult(workspace,()=>downloadBlob(blob,'presentation.pdf'),`✅ ${slideFiles.length} slides converted!`,formatBytes(blob.size));
        showToast('Converted!');
      } catch(e){ showError(workspace,'Error: '+e.message); }
      btnConvert.textContent='📄 Convert to PDF'; btnConvert.disabled=false;
    });
  </script>
</body>
</html>
