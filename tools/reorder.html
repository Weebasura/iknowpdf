<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reorder Pages — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/iknowpdf/css/style.css" />
  <style>
    .page-thumb { cursor: grab; user-select: none; }
    .page-thumb.drag-over { border-color: var(--accent2); transform: scale(1.04); }
  </style>
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="/iknowpdf/index.html" class="logo"><span class="logo-icon">⬡</span>I Know <span class="logo-accent">PDF</span></a>
    </div>
  </header>
  <div class="tool-hero">
    <a href="/iknowpdf/index.html" class="back-link">← All Tools</a>
    <div class="tool-hero-icon">↕️</div>
    <h1>Reorder Pages</h1>
    <p>Drag and drop the page thumbnails to rearrange them, then save.</p>
  </div>

  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <span class="drop-cta">Select PDF</span>
    </div>
    <p id="hint" style="display:none;text-align:center;color:var(--text-muted);font-size:14px;margin-top:16px">✋ Drag pages to reorder them</p>
    <div class="pages-grid" id="pagesGrid"></div>
    <button class="btn-process" id="btnReorder" disabled>↕️ Save Reordered PDF</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="/iknowpdf/js/utils.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let currentFile = null;
    const dropZone = document.getElementById('dropZone');
    const pagesGrid = document.getElementById('pagesGrid');
    const btnReorder = document.getElementById('btnReorder');
    const workspace = document.getElementById('workspace');
    let dragSrc = null;

    document.getElementById('fileInput').addEventListener('change', function() { if(this.files[0]) loadFile(this.files[0]); });
    setupDropZone(dropZone, files => { if(files[0]) loadFile(files[0]); });

    async function loadFile(file) {
      currentFile = file;
      pagesGrid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">Rendering pages…</p>';
      const bytes = await file.arrayBuffer();
      const pdfjs = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;
      const n = pdfjs.numPages;
      pagesGrid.innerHTML = '';

      for (let i = 1; i <= n; i++) {
        const page = await pdfjs.getPage(i);
        const vp = page.getViewport({ scale: 0.35 });
        const canvas = document.createElement('canvas');
        canvas.width = vp.width; canvas.height = vp.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

        const thumb = document.createElement('div');
        thumb.className = 'page-thumb';
        thumb.draggable = true;
        thumb.dataset.origPage = i;
        thumb.innerHTML = `<div class="check" style="opacity:0"></div>`;
        thumb.insertBefore(canvas, thumb.firstChild);
        thumb.insertAdjacentHTML('beforeend', `<div class="page-thumb-label">Page ${i}</div>`);

        thumb.addEventListener('dragstart', e => { dragSrc = thumb; thumb.style.opacity = '0.4'; e.dataTransfer.effectAllowed = 'move'; });
        thumb.addEventListener('dragend', () => { thumb.style.opacity = ''; document.querySelectorAll('.page-thumb').forEach(t => t.classList.remove('drag-over')); });
        thumb.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; thumb.classList.add('drag-over'); });
        thumb.addEventListener('dragleave', () => thumb.classList.remove('drag-over'));
        thumb.addEventListener('drop', e => {
          e.preventDefault(); thumb.classList.remove('drag-over');
          if (dragSrc && dragSrc !== thumb) {
            const allThumbs = Array.from(pagesGrid.children);
            const srcIdx = allThumbs.indexOf(dragSrc);
            const dstIdx = allThumbs.indexOf(thumb);
            if (srcIdx < dstIdx) pagesGrid.insertBefore(dragSrc, thumb.nextSibling);
            else pagesGrid.insertBefore(dragSrc, thumb);
          }
        });

        pagesGrid.appendChild(thumb);
      }
      document.getElementById('hint').style.display = 'block';
      btnReorder.disabled = false;
    }

    btnReorder.addEventListener('click', async () => {
      if (!currentFile) return;
      btnReorder.textContent = 'Saving…'; btnReorder.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        const src = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
        const doc = await PDFLib.PDFDocument.create();
        const order = Array.from(pagesGrid.children).map(t => parseInt(t.dataset.origPage) - 1);
        const pages = await doc.copyPages(src, order);
        pages.forEach(p => doc.addPage(p));
        const out = await doc.save();
        const blob = new Blob([out], {type:'application/pdf'});
        showResult(workspace, () => downloadBlob(blob, 'reordered.pdf'), '✅ Reordered!', formatBytes(blob.size));
        showToast('Pages reordered!');
      } catch(e) { showError(workspace, 'Error: ' + e.message); }
      btnReorder.textContent = '↕️ Save Reordered PDF'; btnReorder.disabled = false;
    });
  </script>
</body>
</html>
