<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extract Pages — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    
    <div class="tool-hero-icon">📤</div>
    <h1>Extract Pages</h1>
    <p>Select the pages you want to keep and extract them into a new PDF.</p>
  </div>

  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <p>or click to browse</p>
      <span class="drop-cta">Select PDF</span>
    </div>
    <div id="selInfo" style="display:none;margin-top:16px;color:var(--text-muted);font-size:14px;text-align:center"></div>
    <div class="pages-grid" id="pagesGrid"></div>
    <button class="btn-process" id="btnExtract" disabled>📤 Extract Selected Pages</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let currentFile = null, selected = new Set();
    const dropZone = document.getElementById('dropZone');
    const pagesGrid = document.getElementById('pagesGrid');
    const btnExtract = document.getElementById('btnExtract');
    const selInfo = document.getElementById('selInfo');
    const workspace = document.getElementById('workspace');

    document.getElementById('fileInput').addEventListener('change', function() { if(this.files[0]) loadFile(this.files[0]); });
    setupDropZone(dropZone, files => { if(files[0]) loadFile(files[0]); });

    async function loadFile(file) {
      currentFile = file;
      pagesGrid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">Rendering pages…</p>';
      const bytes = await file.arrayBuffer();
      const pdfjs = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;
      const n = pdfjs.numPages;
      pagesGrid.innerHTML = ''; selected.clear();
      for (let i = 1; i <= n; i++) {
        const page = await pdfjs.getPage(i);
        const vp = page.getViewport({ scale: 0.4 });
        const canvas = document.createElement('canvas');
        canvas.width = vp.width; canvas.height = vp.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
        const thumb = document.createElement('div');
        thumb.className = 'page-thumb'; thumb.dataset.page = i;
        thumb.innerHTML = `<div class="check">✓</div>`;
        thumb.insertBefore(canvas, thumb.firstChild);
        thumb.insertAdjacentHTML('beforeend', `<div class="page-thumb-label">Page ${i}</div>`);
        thumb.addEventListener('click', () => {
          if (selected.has(i)) { selected.delete(i); thumb.classList.remove('selected'); }
          else { selected.add(i); thumb.classList.add('selected'); }
          selInfo.textContent = selected.size > 0 ? `${selected.size} page(s) selected` : 'Click pages to select';
          btnExtract.disabled = selected.size === 0;
        });
        pagesGrid.appendChild(thumb);
      }
      selInfo.style.display = 'block';
      selInfo.textContent = 'Click pages to select them for extraction';
    }

    btnExtract.addEventListener('click', async () => {
      if (!currentFile || !selected.size) return;
      btnExtract.textContent = 'Extracting…'; btnExtract.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        const src = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
        const doc = await PDFLib.PDFDocument.create();
        const indices = Array.from(selected).sort((a,b)=>a-b).map(i=>i-1);
        const pages = await doc.copyPages(src, indices);
        pages.forEach(p => doc.addPage(p));
        const out = await doc.save();
        const blob = new Blob([out], {type:'application/pdf'});
        showResult(workspace, () => downloadBlob(blob, 'extracted.pdf'),
          `✅ ${selected.size} page(s) extracted!`, formatBytes(blob.size));
        showToast('Pages extracted!');
      } catch(e) { showError(workspace, 'Error: ' + e.message); }
      btnExtract.textContent = '📤 Extract Selected Pages';
      btnExtract.disabled = false;
    });
  </script>
</body>
</html>
