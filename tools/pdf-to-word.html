<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF to Word — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    <div class="tool-hero-icon">📘</div>
    <h1>PDF to Word</h1>
    <p>Extract text from PDF and download as a .docx Word document.</p>
  </div>
  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <span class="drop-cta">Select PDF</span>
    </div>
    <button class="btn-process" id="btnConvert" disabled>📘 Convert to Word</button>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/docx@7.8.2/build/index.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let currentFile = null;
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const btnConvert = document.getElementById('btnConvert');
    const workspace = document.getElementById('workspace');

    fileInput.addEventListener('change', () => { if(fileInput.files[0]) { currentFile=fileInput.files[0]; btnConvert.disabled=false; dropZone.querySelector('h3').textContent=currentFile.name; }});
    dropZone.addEventListener('dragover', e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f&&f.name.endsWith('.pdf')){currentFile=f;btnConvert.disabled=false;dropZone.querySelector('h3').textContent=f.name;}});

    btnConvert.addEventListener('click', async () => {
      if (!currentFile) return;
      btnConvert.textContent = 'Converting…'; btnConvert.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        const pdfjs = await pdfjsLib.getDocument({ data: bytes }).promise;
        let paragraphs = [];
        for (let i = 1; i <= pdfjs.numPages; i++) {
          const page = await pdfjs.getPage(i);
          const content = await page.getTextContent();
          const text = content.items.map(item => item.str).join(' ').trim();
          if (text) paragraphs.push(text);
          paragraphs.push(''); // page break spacing
        }
        // Build simple .docx using docx library
        const { Document, Paragraph, TextRun, Packer } = window.docx;
        const doc = new Document({
          sections: [{
            properties: {},
            children: paragraphs.map(p => new Paragraph({ children: [new TextRun(p)] }))
          }]
        });
        const blob = await Packer.toBlob(doc);
        showResult(workspace, () => downloadBlob(blob, 'converted.docx'), 'Converted to Word!', formatBytes(blob.size));
        showToast('Done!');
      } catch(e) { showError(workspace, 'Error: ' + e.message); }
      btnConvert.textContent = '📘 Convert to Word'; btnConvert.disabled = false;
    });
  </script>
</body>
</html>
