<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Watermark — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    <div class="tool-hero-icon">💧</div>
    <h1>Add Watermark</h1>
    <p>Stamp a text watermark on every page of your PDF.</p>
  </div>
  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <span class="drop-cta">Select PDF</span>
    </div>
    <div class="options-card" id="opts" style="display:none">
      <h3>Watermark Options</h3>
      <div class="option-group">
        <label>Watermark Text</label>
        <input type="text" id="wmText" placeholder="e.g. CONFIDENTIAL, DRAFT, I Know PDF" value="CONFIDENTIAL" />
      </div>
      <div class="option-group">
        <label>Opacity</label>
        <div class="range-row">
          <input type="range" id="opacity" min="5" max="60" value="20" />
          <span class="range-val" id="opVal">20%</span>
        </div>
      </div>
      <div class="option-group">
        <label>Font Size</label>
        <div class="range-row">
          <input type="range" id="fontSize" min="20" max="100" value="52" />
          <span class="range-val" id="fsVal">52</span>
        </div>
      </div>
      <div class="option-group">
        <label>Color</label>
        <div class="radio-group" id="colorGroup">
          <label class="radio-btn selected"><input type="radio" name="color" value="gray" checked>Gray</label>
          <label class="radio-btn"><input type="radio" name="color" value="red">Red</label>
          <label class="radio-btn"><input type="radio" name="color" value="blue">Blue</label>
        </div>
      </div>
    </div>
    <button class="btn-process" id="btnWm" disabled>💧 Add Watermark</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    let currentFile = null;
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const btnWm = document.getElementById('btnWm');
    const workspace = document.getElementById('workspace');

    document.getElementById('opacity').addEventListener('input', function(){ document.getElementById('opVal').textContent = this.value + '%'; });
    document.getElementById('fontSize').addEventListener('input', function(){ document.getElementById('fsVal').textContent = this.value; });
    document.querySelectorAll('.radio-btn').forEach(b=>b.addEventListener('click',()=>{
      b.closest('.radio-group').querySelectorAll('.radio-btn').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');
    }));

    fileInput.addEventListener('change',()=>{if(fileInput.files[0])enable(fileInput.files[0]);});
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f)enable(f);});
    function enable(file){currentFile=file;document.getElementById('opts').style.display='block';btnWm.disabled=false;dropZone.querySelector('h3').textContent=file.name;}

    btnWm.addEventListener('click', async () => {
      if (!currentFile) return;
      btnWm.textContent = 'Adding…'; btnWm.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        const { PDFDocument, rgb, StandardFonts, degrees } = PDFLib;
        const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
        const font = await doc.embedFont(StandardFonts.HelveticaBold);
        const text = document.getElementById('wmText').value || 'WATERMARK';
        const opacity = parseInt(document.getElementById('opacity').value) / 100;
        const fontSize = parseInt(document.getElementById('fontSize').value);
        const colorVal = document.querySelector('#colorGroup .radio-btn.selected input').value;
        const colorMap = { gray: rgb(0.5,0.5,0.5), red: rgb(0.8,0.1,0.1), blue: rgb(0.1,0.1,0.8) };
        const color = colorMap[colorVal];

        doc.getPages().forEach(page => {
          const { width, height } = page.getSize();
          const tw = font.widthOfTextAtSize(text, fontSize);
          page.drawText(text, {
            x: (width - tw) / 2, y: (height - fontSize) / 2,
            size: fontSize, font, color, opacity,
            rotate: degrees(45),
          });
        });

        const out = await doc.save();
        const blob = new Blob([out], {type:'application/pdf'});
        showResult(workspace, ()=>downloadBlob(blob,'watermarked.pdf'), 'Watermark Added!', formatBytes(blob.size));
        showToast('Watermark added!');
      } catch(e) { showError(workspace, e.message); }
      btnWm.textContent = '💧 Add Watermark'; btnWm.disabled = false;
    });
  </script>
</body>
</html>
