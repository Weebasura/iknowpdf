<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Split PDF — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/iknowpdf/css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="/iknowpdf/index.html" class="logo"><span class="logo-icon">⬡</span>I Know <span class="logo-accent">PDF</span></a>
    </div>
  </header>
  <div class="tool-hero">
    <a href="/iknowpdf/index.html" class="back-link">← All Tools</a>
    <div class="tool-hero-icon">✂️</div>
    <h1>Split PDF</h1>
    <p>Split a PDF into multiple files by page ranges or extract every page separately.</p>
  </div>

  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <p>or click to browse</p>
      <span class="drop-cta">Select PDF</span>
    </div>

    <div class="options-card" id="opts" style="display:none">
      <h3>Split Options</h3>
      <div class="option-group">
        <label>Split Mode</label>
        <div class="radio-group" id="splitMode">
          <label class="radio-btn selected"><input type="radio" name="mode" value="range" checked>By Page Range</label>
          <label class="radio-btn"><input type="radio" name="mode" value="every">Every Page</label>
          <label class="radio-btn"><input type="radio" name="mode" value="fixed">Fixed Size</label>
        </div>
      </div>
      <div class="option-group" id="rangeGroup">
        <label>Page Ranges (e.g. 1-3, 5, 7-9)</label>
        <input type="text" id="rangeInput" placeholder="1-3, 5, 7-9" />
        <p style="font-size:12px;color:var(--text-muted);margin-top:6px" id="pageCountInfo"></p>
      </div>
      <div class="option-group" id="fixedGroup" style="display:none">
        <label>Pages per file</label>
        <input type="number" id="fixedInput" value="2" min="1" />
      </div>
    </div>
    <button class="btn-process" id="btnSplit" disabled>✂️ Split PDF</button>
    <div id="resultArea"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="/iknowpdf/js/utils.js"></script>
  <script>
    let currentFile = null, totalPages = 0;
    const dropZone = document.getElementById('dropZone');
    const btnSplit = document.getElementById('btnSplit');
    const workspace = document.getElementById('workspace');
    const opts = document.getElementById('opts');
    const resultArea = document.getElementById('resultArea');

    document.getElementById('fileInput').addEventListener('change', function() {
      if (this.files[0]) loadFile(this.files[0]);
    });
    setupDropZone(dropZone, files => { if(files[0]) loadFile(files[0]); });

    async function loadFile(file) {
      currentFile = file;
      const bytes = await file.arrayBuffer();
      const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
      totalPages = doc.getPageCount();
      document.getElementById('pageCountInfo').textContent = `This PDF has ${totalPages} pages`;
      document.getElementById('rangeInput').placeholder = `1-${Math.min(3, totalPages)}, ${Math.min(5, totalPages)}`;
      opts.style.display = 'block';
      btnSplit.disabled = false;
      dropZone.querySelector('h3').textContent = file.name;
    }

    document.querySelectorAll('#splitMode .radio-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#splitMode .radio-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        const val = btn.querySelector('input').value;
        document.getElementById('rangeGroup').style.display = val === 'range' ? '' : 'none';
        document.getElementById('fixedGroup').style.display = val === 'fixed' ? '' : 'none';
      });
    });

    function parseRanges(str, max) {
      const parts = str.split(',').map(s => s.trim()).filter(Boolean);
      const ranges = [];
      for (const part of parts) {
        if (part.includes('-')) {
          const [a, b] = part.split('-').map(Number);
          if (!isNaN(a) && !isNaN(b)) ranges.push([Math.max(1,a), Math.min(max,b)]);
        } else {
          const n = Number(part);
          if (!isNaN(n) && n >= 1 && n <= max) ranges.push([n, n]);
        }
      }
      return ranges;
    }

    btnSplit.addEventListener('click', async () => {
      if (!currentFile) return;
      btnSplit.textContent = 'Splitting…'; btnSplit.disabled = true;
      resultArea.innerHTML = '';
      try {
        const bytes = await currentFile.arrayBuffer();
        const src = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
        const mode = document.querySelector('#splitMode .radio-btn.selected input').value;
        let ranges = [];

        if (mode === 'every') {
          ranges = Array.from({length: totalPages}, (_, i) => [i+1, i+1]);
        } else if (mode === 'fixed') {
          const size = parseInt(document.getElementById('fixedInput').value) || 1;
          for (let i = 1; i <= totalPages; i += size) ranges.push([i, Math.min(i+size-1, totalPages)]);
        } else {
          ranges = parseRanges(document.getElementById('rangeInput').value || `1-${totalPages}`, totalPages);
          if (!ranges.length) { showError(workspace, 'Invalid page range'); return; }
        }

        const blobs = [];
        for (const [start, end] of ranges) {
          const doc = await PDFLib.PDFDocument.create();
          const indices = Array.from({length: end-start+1}, (_,i) => start-1+i);
          const pages = await doc.copyPages(src, indices);
          pages.forEach(p => doc.addPage(p));
          const out = await doc.save();
          blobs.push({ blob: new Blob([out], {type:'application/pdf'}), name: `split_${start}-${end}.pdf` });
        }

        resultArea.innerHTML = `<div class="result-card">
          <div class="result-icon">✅</div>
          <h3>Split into ${blobs.length} file${blobs.length > 1 ? 's' : ''}!</h3>
          <p>Click each file to download</p>
          <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:16px">
            ${blobs.map((b, i) => `<button class="btn-download" onclick="downloadFile(${i})" style="font-size:13px;padding:10px 18px">${b.name}</button>`).join('')}
          </div>
        </div>`;
        window._blobs = blobs;
        window.downloadFile = (i) => downloadBlob(window._blobs[i].blob, window._blobs[i].name);
        showToast(`Split into ${blobs.length} files!`);
      } catch(e) { showError(workspace, 'Error: ' + e.message); }
      btnSplit.textContent = '✂️ Split PDF'; btnSplit.disabled = false;
    });
  </script>
</body>
</html>
