<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR PDF — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    <div class="tool-hero-icon">🔍</div>
    <h1>OCR PDF</h1>
    <p>Extract text from scanned PDFs and images using Optical Character Recognition.</p>
  </div>
  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf,image/*" />
      <div class="drop-icon">📄</div>
      <h3>Drop your scanned PDF or image here</h3>
      <p>PDF, JPG, PNG supported</p>
      <span class="drop-cta">Select File</span>
    </div>
    <div class="options-card" id="opts" style="display:none">
      <h3>OCR Options</h3>
      <div class="option-group">
        <label>Language</label>
        <select id="lang">
          <option value="eng">English</option>
          <option value="hin">Hindi</option>
          <option value="fra">French</option>
          <option value="deu">German</option>
          <option value="spa">Spanish</option>
          <option value="por">Portuguese</option>
          <option value="chi_sim">Chinese (Simplified)</option>
          <option value="ara">Arabic</option>
          <option value="jpn">Japanese</option>
        </select>
      </div>
    </div>
    <button class="btn-process" id="btnOCR" disabled>🔍 Run OCR</button>
    <div id="progress" style="display:none;margin-top:16px">
      <p id="progressTxt" style="font-size:14px;color:var(--text-mid);margin-bottom:8px">Processing…</p>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    </div>
    <div id="resultArea"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let currentFile = null;
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const btnOCR = document.getElementById('btnOCR');
    const workspace = document.getElementById('workspace');
    const resultArea = document.getElementById('resultArea');
    const progressDiv = document.getElementById('progress');
    const progressTxt = document.getElementById('progressTxt');
    const progressBar = document.getElementById('progressBar');

    fileInput.addEventListener('change',()=>{if(fileInput.files[0])enable(fileInput.files[0]);});
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f)enable(f);});
    function enable(f){currentFile=f;document.getElementById('opts').style.display='block';btnOCR.disabled=false;dropZone.querySelector('h3').textContent=f.name;}

    btnOCR.addEventListener('click', async () => {
      if (!currentFile) return;
      btnOCR.disabled = true; btnOCR.textContent = 'Running OCR…';
      progressDiv.style.display = 'block'; resultArea.innerHTML = '';
      const lang = document.getElementById('lang').value;
      let extractedText = '';
      try {
        let canvases = [];
        if (currentFile.type === 'application/pdf' || currentFile.name.endsWith('.pdf')) {
          const bytes = await currentFile.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({data:bytes}).promise;
          progressTxt.textContent = `Rendering ${pdf.numPages} pages…`;
          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const vp = page.getViewport({scale:2});
            const canvas = document.createElement('canvas');
            canvas.width = vp.width; canvas.height = vp.height;
            await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
            canvases.push({canvas, pageNum: i});
          }
        } else {
          const url = URL.createObjectURL(currentFile);
          const img = await new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.src=url;});
          const canvas = document.createElement('canvas');
          canvas.width=img.naturalWidth;canvas.height=img.naturalHeight;
          canvas.getContext('2d').drawImage(img,0,0);
          canvases.push({canvas,pageNum:1});
          URL.revokeObjectURL(url);
        }

        const worker = await Tesseract.createWorker(lang, 1, {
          logger: m => {
            if (m.status === 'recognizing text') {
              progressBar.style.width = Math.round(m.progress*100)+'%';
              progressTxt.textContent = `OCR: ${Math.round(m.progress*100)}%`;
            }
          }
        });

        for (const {canvas, pageNum} of canvases) {
          progressTxt.textContent = `OCR page ${pageNum} of ${canvases.length}…`;
          const result = await worker.recognize(canvas);
          extractedText += `\n\n=== Page ${pageNum} ===\n\n` + result.data.text;
        }
        await worker.terminate();

        resultArea.innerHTML = `
          <div class="result-card">
            <div class="result-icon">✅</div>
            <h3>OCR Complete!</h3>
            <p>${canvases.length} page(s) processed</p>
            <div class="text-output" style="text-align:left">${extractedText.replace(/</g,'&lt;')}</div>
            <div style="display:flex;gap:12px;margin-top:16px;justify-content:center;flex-wrap:wrap">
              <button class="btn-download" id="btnCopy" style="background:var(--surface,#eee);color:var(--text,#333);border:1px solid var(--border,#ccc)">📋 Copy Text</button>
              <button class="btn-download" id="btnDl">⬇ Download .txt</button>
            </div>
          </div>`;
        document.getElementById('btnCopy').onclick = ()=>{navigator.clipboard.writeText(extractedText);showToast('Copied!');};
        document.getElementById('btnDl').onclick = ()=>downloadBlob(new Blob([extractedText],{type:'text/plain'}),'ocr-result.txt');
        showToast('OCR complete!');
      } catch(e) { showError(workspace, 'OCR error: ' + e.message); }
      progressDiv.style.display = 'none';
      btnOCR.disabled = false; btnOCR.textContent = '🔍 Run OCR';
    });
  </script>
  <style>
    .progress-bar-wrap{background:#e5e7eb;border-radius:100px;height:6px;overflow:hidden;margin-top:4px}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,#e8314a,#ff6b9d);border-radius:100px;transition:width .3s}
  </style>
</body>
</html>
