<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel to PDF — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    <div class="tool-hero-icon">📗</div>
    <h1>Excel to PDF</h1>
    <p>Convert your Excel spreadsheet data into a clean PDF table.</p>
  </div>
  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
      <div class="drop-icon">📗</div>
      <h3>Drop your Excel or CSV file here</h3>
      <p>.xlsx, .xls, .csv supported</p>
      <span class="drop-cta">Select File</span>
    </div>
    <button class="btn-process" id="btnConvert" disabled>📄 Convert to PDF</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    let currentFile = null;
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const btnConvert = document.getElementById('btnConvert');
    const workspace = document.getElementById('workspace');
    fileInput.addEventListener('change',()=>{if(fileInput.files[0]){currentFile=fileInput.files[0];btnConvert.disabled=false;dropZone.querySelector('h3').textContent=currentFile.name;}});
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f){currentFile=f;btnConvert.disabled=false;dropZone.querySelector('h3').textContent=f.name;}});

    btnConvert.addEventListener('click', async () => {
      if (!currentFile) return;
      btnConvert.textContent = 'Converting…'; btnConvert.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        const wb = XLSX.read(bytes, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        const doc = await PDFDocument.create();
        const font = await doc.embedFont(StandardFonts.Helvetica);
        const boldFont = await doc.embedFont(StandardFonts.HelveticaBold);

        const pageW = 842, pageH = 595; // A4 landscape
        const margin = 36;
        const rowH = 20;
        const fontSize = 9;
        const cols = data[0] ? data[0].length : 1;
        const colW = Math.min(140, (pageW - margin*2) / cols);

        let page = doc.addPage([pageW, pageH]);
        let y = pageH - margin;

        for (let ri = 0; ri < data.length; ri++) {
          if (y < margin + rowH) {
            page = doc.addPage([pageW, pageH]);
            y = pageH - margin;
          }
          const row = data[ri];
          const isHeader = ri === 0;
          if (isHeader) {
            page.drawRectangle({x:margin,y:y-rowH+4,width:pageW-margin*2,height:rowH,color:rgb(0.2,0.4,0.8)});
          } else if (ri % 2 === 0) {
            page.drawRectangle({x:margin,y:y-rowH+4,width:pageW-margin*2,height:rowH,color:rgb(0.95,0.97,1)});
          }
          for (let ci = 0; ci < Math.min(cols,20); ci++) {
            const cellText = String(row[ci]||'').substring(0,25);
            const x = margin + ci * colW;
            page.drawText(cellText, {
              x: x+4, y: y-2,
              size: fontSize,
              font: isHeader ? boldFont : font,
              color: isHeader ? rgb(1,1,1) : rgb(0.1,0.1,0.1),
              maxWidth: colW-8
            });
          }
          y -= rowH;
        }

        const out = await doc.save();
        const blob = new Blob([out],{type:'application/pdf'});
        showResult(workspace,()=>downloadBlob(blob,'spreadsheet.pdf'),`✅ ${data.length} rows converted!`,formatBytes(blob.size));
        showToast('Converted!');
      } catch(e){ showError(workspace,'Error: '+e.message); }
      btnConvert.textContent='📄 Convert to PDF'; btnConvert.disabled=false;
    });
  </script>
</body>
</html>
