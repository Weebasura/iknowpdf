<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML to PDF — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    <div class="tool-hero-icon">🌐</div>
    <h1>HTML to PDF</h1>
    <p>Convert an HTML file or paste HTML code and download as PDF.</p>
  </div>
  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".html,.htm" />
      <div class="drop-icon">🌐</div>
      <h3>Drop your HTML file here</h3>
      <p>Or paste HTML code below</p>
      <span class="drop-cta">Select HTML File</span>
    </div>
    <div class="options-card" style="margin-top:16px">
      <h3>Or paste HTML code</h3>
      <div class="option-group">
        <textarea id="htmlCode" rows="8" style="width:100%;background:var(--bg,#f7f8fc);border:1.5px solid var(--border,#e2e4ef);border-radius:8px;padding:12px;font-family:monospace;font-size:13px;color:var(--text,#1a1a2e);resize:vertical" placeholder="<h1>Hello World</h1><p>Your content here...</p>"></textarea>
      </div>
    </div>
    <button class="btn-process" id="btnConvert">🌐 Convert to PDF</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    let htmlContent = '';
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const btnConvert = document.getElementById('btnConvert');
    const workspace = document.getElementById('workspace');
    const htmlCode = document.getElementById('htmlCode');

    fileInput.addEventListener('change', async ()=>{
      if(fileInput.files[0]){
        htmlContent = await fileInput.files[0].text();
        htmlCode.value = htmlContent;
        dropZone.querySelector('h3').textContent = fileInput.files[0].name;
      }
    });
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',async e=>{e.preventDefault();dropZone.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f){htmlContent=await f.text();htmlCode.value=htmlContent;dropZone.querySelector('h3').textContent=f.name;}});

    btnConvert.addEventListener('click', async () => {
      const code = htmlCode.value.trim();
      if (!code) { showError(workspace, 'Please provide HTML content'); return; }
      btnConvert.textContent = 'Converting…'; btnConvert.disabled = true;
      try {
        // Render HTML in hidden iframe, capture as image
        const iframe = document.createElement('iframe');
        iframe.style.cssText = 'position:fixed;left:-9999px;top:0;width:800px;height:1000px;border:none;';
        document.body.appendChild(iframe);
        iframe.contentDocument.open();
        iframe.contentDocument.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:24px;font-family:sans-serif;font-size:14px;line-height:1.6}</style></head><body>${code}</body></html>`);
        iframe.contentDocument.close();
        await new Promise(r=>setTimeout(r,800));

        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        const doc = await PDFDocument.create();
        const font = await doc.embedFont(StandardFonts.Helvetica);
        const boldFont = await doc.embedFont(StandardFonts.HelveticaBold);

        // Extract text nodes from iframe
        const body = iframe.contentDocument.body;
        const elements = Array.from(body.querySelectorAll('h1,h2,h3,h4,p,li,td,th,span,div')).filter(el=>el.children.length===0&&el.textContent.trim());

        const pageW = 595, pageH = 842, margin = 50;
        let page = doc.addPage([pageW, pageH]);
        let y = pageH - margin;

        for (const el of elements) {
          const text = el.textContent.trim();
          if (!text) continue;
          const tag = el.tagName.toLowerCase();
          const isHeading = ['h1','h2','h3','h4'].includes(tag);
          const sz = tag==='h1'?22:tag==='h2'?18:tag==='h3'?15:12;
          const f = isHeading ? boldFont : font;
          const lineH = sz * 1.5;
          const maxW = pageW - margin*2;

          if (y < margin + lineH*2) { page = doc.addPage([pageW,pageH]); y = pageH - margin; }
          if (isHeading) y -= 8;

          const words = text.split(' ');
          let line = '';
          for (const word of words) {
            const test = line ? line+' '+word : word;
            if (f.widthOfTextAtSize(test,sz) > maxW && line) {
              if (y<margin) {page=doc.addPage([pageW,pageH]);y=pageH-margin;}
              page.drawText(line,{x:margin,y,size:sz,font:f,color:rgb(0.1,0.1,0.1)});
              y-=lineH; line=word;
            } else line=test;
          }
          if (line) {
            if (y<margin){page=doc.addPage([pageW,pageH]);y=pageH-margin;}
            page.drawText(line,{x:margin,y,size:sz,font:f,color:rgb(0.1,0.1,0.1)});
            y-=lineH;
          }
          if (isHeading) y -= 6;
        }

        document.body.removeChild(iframe);
        const out = await doc.save();
        const blob = new Blob([out],{type:'application/pdf'});
        showResult(workspace,()=>downloadBlob(blob,'converted.pdf'),'✅ HTML converted to PDF!',formatBytes(blob.size));
        showToast('Converted!');
      } catch(e){ showError(workspace,'Error: '+e.message); }
      btnConvert.textContent='🌐 Convert to PDF'; btnConvert.disabled=false;
    });
  </script>
</body>
</html>
