<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulk PDF to JPG — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    <div class="tool-hero-icon">🖼️</div>
    <h1>Bulk PDF to JPG</h1>
    <p>Convert multiple PDFs to JPG images all at once!</p>
  </div>
  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" multiple accept=".pdf" />
      <div class="drop-icon">📂</div>
      <h3>Drop multiple PDF files here</h3>
      <p>Convert up to 20 PDFs at once</p>
      <span class="drop-cta">Select PDFs</span>
    </div>
    <div class="file-list" id="fileList"></div>
    <div class="options-card" id="opts" style="display:none">
      <h3>Options</h3>
      <div class="option-group">
        <label>Image Quality</label>
        <div class="range-row">
          <input type="range" id="quality" min="1" max="3" value="2" step="0.5"/>
          <span class="range-val" id="qVal">2x</span>
        </div>
      </div>
    </div>
    <button class="btn-process" id="btnConvert" disabled>🖼️ Convert All PDFs</button>
    <div id="resultArea"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let fileMap = [];
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const fileList = document.getElementById('fileList');
    const btnConvert = document.getElementById('btnConvert');
    const resultArea = document.getElementById('resultArea');
    const workspace = document.getElementById('workspace');

    document.getElementById('quality').addEventListener('input',function(){document.getElementById('qVal').textContent=this.value+'x';});
    fileInput.addEventListener('click',()=>{fileInput.value='';});
    fileInput.addEventListener('change',()=>{if(fileInput.files.length)addFiles(Array.from(fileInput.files));});
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');addFiles(Array.from(e.dataTransfer.files).filter(f=>f.name.endsWith('.pdf')));});

    function addFiles(newFiles) {
      newFiles.forEach(f => {
        if (f.name.endsWith('.pdf')) {
          const id = Date.now() + Math.random();
          fileMap.push({id, file:f});
          const item = createFileItem(f, ()=>{fileMap=fileMap.filter(x=>x.id!==id);updateBtn();});
          item.querySelector('.file-icon-sm').textContent='📄';
          fileList.appendChild(item);
        }
      });
      updateBtn();
    }
    function updateBtn(){
      btnConvert.disabled = fileMap.length === 0;
      document.getElementById('opts').style.display = fileMap.length ? 'block' : 'none';
    }

    btnConvert.addEventListener('click', async () => {
      if (!fileMap.length) return;
      btnConvert.textContent = 'Converting…'; btnConvert.disabled = true;
      resultArea.innerHTML = '';
      const scale = parseFloat(document.getElementById('quality').value);
      const allBlobs = [];

      for (const {file} of fileMap) {
        try {
          const bytes = await file.arrayBuffer();
          const pdfjs = await pdfjsLib.getDocument({ data: bytes }).promise;
          for (let i = 1; i <= pdfjs.numPages; i++) {
            const page = await pdfjs.getPage(i);
            const vp = page.getViewport({scale});
            const canvas = document.createElement('canvas');
            canvas.width = vp.width; canvas.height = vp.height;
            await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
            const res = await fetch(canvas.toDataURL('image/jpeg', 0.9));
            const blob = await res.blob();
            const name = file.name.replace('.pdf','') + `_page${i}.jpg`;
            allBlobs.push({blob, name});
          }
        } catch(e) { console.error(e); }
      }

      if (allBlobs.length) {
        resultArea.innerHTML = `<div class="result-card">
          <div class="result-icon">✅</div>
          <h3>${allBlobs.length} image${allBlobs.length>1?'s':''} ready!</h3>
          <p>From ${fileMap.length} PDF file${fileMap.length>1?'s':''}</p>
          <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px">
            ${allBlobs.map((b,i)=>`<button class="btn-download" onclick="dl(${i})" style="font-size:12px;padding:8px 14px">${b.name}</button>`).join('')}
          </div>
        </div>`;
        window._blobs = allBlobs;
        window.dl = i => downloadBlob(window._blobs[i].blob, window._blobs[i].name);
        showToast(`${allBlobs.length} images ready!`);
      }
      btnConvert.textContent = '🖼️ Convert All PDFs'; btnConvert.disabled = false;
    });
  </script>
</body>
</html>
