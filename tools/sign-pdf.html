<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign PDF — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    <div class="tool-hero-icon">✍️</div>
    <h1>Sign PDF</h1>
    <p>Draw your signature and stamp it onto your PDF document.</p>
  </div>
  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <span class="drop-cta">Select PDF</span>
    </div>

    <div class="options-card" id="opts" style="display:none">
      <h3>Draw Your Signature</h3>
      <canvas id="sigCanvas" width="680" height="160" style="border:2px solid var(--border,#e2e4ef);border-radius:8px;background:#fff;cursor:crosshair;width:100%;touch-action:none"></canvas>
      <div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap">
        <button onclick="clearSig()" style="background:var(--bg,#f7f8fc);border:1px solid var(--border,#e2e4ef);border-radius:8px;padding:9px 18px;cursor:pointer;font-family:inherit">🗑 Clear</button>
        <select id="sigColor" style="background:var(--bg,#f7f8fc);border:1px solid var(--border,#e2e4ef);border-radius:8px;padding:9px 14px;font-family:inherit">
          <option value="#1a1a2e">Black</option>
          <option value="#1a3a8a">Blue (ink)</option>
          <option value="#8a0000">Red</option>
        </select>
      </div>
      <div class="option-group" style="margin-top:16px">
        <label>Place signature on page</label>
        <div class="radio-group" id="posGroup">
          <label class="radio-btn selected"><input type="radio" name="pos" value="bottom-right" checked>Bottom Right</label>
          <label class="radio-btn"><input type="radio" name="pos" value="bottom-left">Bottom Left</label>
          <label class="radio-btn"><input type="radio" name="pos" value="bottom-center">Bottom Center</label>
        </div>
      </div>
      <div class="option-group">
        <label>Apply to which pages</label>
        <div class="radio-group" id="pageGroup">
          <label class="radio-btn selected"><input type="radio" name="pages" value="last" checked>Last page only</label>
          <label class="radio-btn"><input type="radio" name="pages" value="all">All pages</label>
          <label class="radio-btn"><input type="radio" name="pages" value="first">First page only</label>
        </div>
      </div>
    </div>
    <button class="btn-process" id="btnSign" disabled>✍️ Sign & Save PDF</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    let currentFile=null,drawing=false,lastX=0,lastY=0;
    const fileInput=document.getElementById('fileInput');
    const dropZone=document.getElementById('dropZone');
    const btnSign=document.getElementById('btnSign');
    const workspace=document.getElementById('workspace');
    const canvas=document.getElementById('sigCanvas');
    const ctx=canvas.getContext('2d');
    ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';

    document.querySelectorAll('.radio-btn').forEach(b=>b.addEventListener('click',()=>{b.closest('.radio-group').querySelectorAll('.radio-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');}));
    document.getElementById('sigColor').addEventListener('change',function(){ctx.strokeStyle=this.value;});

    function getPos(e){
      const r=canvas.getBoundingClientRect();
      const scaleX=canvas.width/r.width;
      const scaleY=canvas.height/r.height;
      const src=e.touches?e.touches[0]:e;
      return{x:(src.clientX-r.left)*scaleX,y:(src.clientY-r.top)*scaleY};
    }
    canvas.addEventListener('mousedown',e=>{drawing=true;const p=getPos(e);lastX=p.x;lastY=p.y;});
    canvas.addEventListener('mousemove',e=>{if(!drawing)return;const p=getPos(e);ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.stroke();lastX=p.x;lastY=p.y;});
    canvas.addEventListener('mouseup',()=>drawing=false);
    canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=getPos(e);lastX=p.x;lastY=p.y;});
    canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=getPos(e);ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.stroke();lastX=p.x;lastY=p.y;});
    canvas.addEventListener('touchend',()=>drawing=false);
    function clearSig(){ctx.clearRect(0,0,canvas.width,canvas.height);}

    fileInput.addEventListener('change',()=>{if(fileInput.files[0])enable(fileInput.files[0]);});
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f)enable(f);});
    function enable(f){currentFile=f;document.getElementById('opts').style.display='block';btnSign.disabled=false;dropZone.querySelector('h3').textContent=f.name;}

    btnSign.addEventListener('click', async ()=>{
      if(!currentFile)return;
      const sigData=canvas.toDataURL('image/png');
      if(sigData===document.createElement('canvas').toDataURL()){showError(workspace,'Please draw your signature first');return;}
      btnSign.textContent='Signing…';btnSign.disabled=true;
      try {
        const bytes=await currentFile.arrayBuffer();
        const {PDFDocument}=PDFLib;
        const doc=await PDFDocument.load(bytes,{ignoreEncryption:true});
        const pages=doc.getPages();
        const sigRes=await fetch(sigData);
        const sigBytes=await sigRes.arrayBuffer();
        const sigImg=await doc.embedPng(sigBytes);
        const sigW=200,sigH=80;
        const pos=document.querySelector('#posGroup .radio-btn.selected input').value;
        const pagesSel=document.querySelector('#pageGroup .radio-btn.selected input').value;
        const margin=24;

        let targetPages=[];
        if(pagesSel==='last')targetPages=[pages[pages.length-1]];
        else if(pagesSel==='first')targetPages=[pages[0]];
        else targetPages=pages;

        for(const page of targetPages){
          const {width,height}=page.getSize();
          let x,y;
          if(pos==='bottom-right'){x=width-sigW-margin;y=margin;}
          else if(pos==='bottom-left'){x=margin;y=margin;}
          else{x=(width-sigW)/2;y=margin;}
          page.drawImage(sigImg,{x,y,width:sigW,height:sigH});
        }

        const out=await doc.save();
        const blob=new Blob([out],{type:'application/pdf'});
        showResult(workspace,()=>downloadBlob(blob,'signed.pdf'),'✅ PDF Signed!',formatBytes(blob.size));
        showToast('PDF signed!');
      }catch(e){showError(workspace,'Error: '+e.message);}
      btnSign.textContent='✍️ Sign & Save PDF';btnSign.disabled=false;
    });
  </script>
</body>
</html>
