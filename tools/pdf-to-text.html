<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF to Text — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/iknowpdf/css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="/iknowpdf/index.html" class="logo"><span class="logo-icon">⬡</span>I Know <span class="logo-accent">PDF</span></a>
    </div>
  </header>
  <div class="tool-hero">
    <a href="/iknowpdf/index.html" class="back-link">← All Tools</a>
    <div class="tool-hero-icon">📝</div>
    <h1>PDF to Text</h1>
    <p>Extract all readable text from a PDF document.</p>
  </div>

  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <span class="drop-cta">Select PDF</span>
    </div>
    <button class="btn-process" id="btnExtract" disabled>📝 Extract Text</button>
    <div id="textOut" style="display:none">
      <div class="text-output" id="textContent"></div>
      <div style="display:flex;gap:12px;margin-top:16px;flex-wrap:wrap">
        <button class="btn-download" id="btnCopy" style="background:var(--surface);color:var(--text);border:1px solid var(--border)">📋 Copy Text</button>
        <button class="btn-download" id="btnDl">⬇ Download .txt</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="/iknowpdf/js/utils.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let currentFile = null, extractedText = '';
    const dropZone = document.getElementById('dropZone');
    const btnExtract = document.getElementById('btnExtract');
    const workspace = document.getElementById('workspace');

    document.getElementById('fileInput').addEventListener('change', function() { if(this.files[0]){ currentFile=this.files[0]; btnExtract.disabled=false; dropZone.querySelector('h3').textContent=currentFile.name; } });
    setupDropZone(dropZone, files => { if(files[0]){ currentFile=files[0]; btnExtract.disabled=false; dropZone.querySelector('h3').textContent=currentFile.name; } });

    btnExtract.addEventListener('click', async () => {
      if (!currentFile) return;
      btnExtract.textContent = 'Extracting…'; btnExtract.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        const pdfjs = await pdfjsLib.getDocument({ data: bytes }).promise;
        let text = '';
        for (let i = 1; i <= pdfjs.numPages; i++) {
          const page = await pdfjs.getPage(i);
          const content = await page.getTextContent();
          text += `\n\n=== Page ${i} ===\n\n`;
          text += content.items.map(item => item.str).join(' ');
        }
        extractedText = text.trim();
        document.getElementById('textContent').textContent = extractedText || '(No extractable text found — PDF may be scanned/image-based)';
        document.getElementById('textOut').style.display = 'block';
        showToast('Text extracted!');
      } catch(e) { showError(workspace, 'Error: ' + e.message); }
      btnExtract.textContent = '📝 Extract Text'; btnExtract.disabled = false;
    });

    document.getElementById('btnCopy').addEventListener('click', () => {
      navigator.clipboard.writeText(extractedText).then(() => showToast('Copied to clipboard!'));
    });
    document.getElementById('btnDl').addEventListener('click', () => {
      const blob = new Blob([extractedText], {type:'text/plain'});
      downloadBlob(blob, 'extracted-text.txt');
    });
  </script>
</body>
</html>
