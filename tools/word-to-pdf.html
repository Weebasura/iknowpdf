<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word to PDF — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    <div class="tool-hero-icon">📝</div>
    <h1>Word to PDF</h1>
    <p>Convert your .docx Word document into a PDF file.</p>
  </div>
  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".docx,.doc" />
      <div class="drop-icon">📘</div>
      <h3>Drop your Word file here</h3>
      <p>.docx files supported</p>
      <span class="drop-cta">Select Word File</span>
    </div>
    <button class="btn-process" id="btnConvert" disabled>📄 Convert to PDF</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    let currentFile = null;
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const btnConvert = document.getElementById('btnConvert');
    const workspace = document.getElementById('workspace');

    fileInput.addEventListener('change', () => { if(fileInput.files[0]){currentFile=fileInput.files[0];btnConvert.disabled=false;dropZone.querySelector('h3').textContent=currentFile.name;}});
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f){currentFile=f;btnConvert.disabled=false;dropZone.querySelector('h3').textContent=f.name;}});

    btnConvert.addEventListener('click', async () => {
      if (!currentFile) return;
      btnConvert.textContent = 'Converting…'; btnConvert.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        // Extract text from docx using mammoth
        const result = await mammoth.extractRawText({ arrayBuffer: bytes });
        const text = result.value;
        const lines = text.split('\n').filter(l => l.trim());

        // Build PDF with pdf-lib
        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        const doc = await PDFDocument.create();
        const font = await doc.embedFont(StandardFonts.Helvetica);
        const fontSize = 12;
        const margin = 50;
        const lineH = fontSize * 1.5;
        const pageW = 595, pageH = 842;
        const maxW = pageW - margin * 2;

        let page = doc.addPage([pageW, pageH]);
        let y = pageH - margin;

        for (const line of lines) {
          // Word wrap
          const words = line.split(' ');
          let currentLine = '';
          for (const word of words) {
            const test = currentLine ? currentLine + ' ' + word : word;
            const w = font.widthOfTextAtSize(test, fontSize);
            if (w > maxW && currentLine) {
              if (y < margin + lineH) { page = doc.addPage([pageW, pageH]); y = pageH - margin; }
              page.drawText(currentLine, { x: margin, y, size: fontSize, font, color: rgb(0,0,0) });
              y -= lineH;
              currentLine = word;
            } else { currentLine = test; }
          }
          if (currentLine) {
            if (y < margin + lineH) { page = doc.addPage([pageW, pageH]); y = pageH - margin; }
            page.drawText(currentLine, { x: margin, y, size: fontSize, font, color: rgb(0,0,0) });
            y -= lineH;
          }
          y -= 4; // paragraph spacing
        }

        const out = await doc.save();
        const blob = new Blob([out], {type:'application/pdf'});
        showResult(workspace, () => downloadBlob(blob, 'converted.pdf'), 'Converted to PDF!', formatBytes(blob.size));
        showToast('Done!');
      } catch(e) { showError(workspace, 'Error: ' + e.message); }
      btnConvert.textContent = '📄 Convert to PDF'; btnConvert.disabled = false;
    });
  </script>
</body>
</html>
