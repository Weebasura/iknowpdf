<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crop PDF — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    <div class="tool-hero-icon">✂️</div>
    <h1>Crop PDF</h1>
    <p>Set custom margins to crop all pages of your PDF.</p>
  </div>
  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <span class="drop-cta">Select PDF</span>
    </div>
    <div class="options-card" id="opts" style="display:none">
      <h3>Crop Margins (in points, 1 inch = 72pt)</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="option-group">
          <label>Top margin</label>
          <input type="number" id="top" value="36" min="0" />
        </div>
        <div class="option-group">
          <label>Bottom margin</label>
          <input type="number" id="bottom" value="36" min="0" />
        </div>
        <div class="option-group">
          <label>Left margin</label>
          <input type="number" id="left" value="36" min="0" />
        </div>
        <div class="option-group">
          <label>Right margin</label>
          <input type="number" id="right" value="36" min="0" />
        </div>
      </div>
    </div>
    <button class="btn-process" id="btnCrop" disabled>✂️ Crop PDF</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    let currentFile = null;
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const btnCrop = document.getElementById('btnCrop');
    const workspace = document.getElementById('workspace');

    fileInput.addEventListener('change',()=>{if(fileInput.files[0])enable(fileInput.files[0]);});
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f)enable(f);});
    function enable(file){currentFile=file;document.getElementById('opts').style.display='block';btnCrop.disabled=false;dropZone.querySelector('h3').textContent=file.name;}

    btnCrop.addEventListener('click', async () => {
      if (!currentFile) return;
      btnCrop.textContent = 'Cropping…'; btnCrop.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        const { PDFDocument } = PDFLib;
        const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
        const top = parseInt(document.getElementById('top').value)||0;
        const bottom = parseInt(document.getElementById('bottom').value)||0;
        const left = parseInt(document.getElementById('left').value)||0;
        const right = parseInt(document.getElementById('right').value)||0;

        doc.getPages().forEach(page => {
          const { width, height } = page.getSize();
          page.setCropBox(left, bottom, width - left - right, height - top - bottom);
        });

        const out = await doc.save();
        const blob = new Blob([out], {type:'application/pdf'});
        showResult(workspace, ()=>downloadBlob(blob,'cropped.pdf'), 'PDF Cropped!', formatBytes(blob.size));
        showToast('PDF cropped!');
      } catch(e) { showError(workspace, e.message); }
      btnCrop.textContent = '✂️ Crop PDF'; btnCrop.disabled = false;
    });
  </script>
</body>
</html>
