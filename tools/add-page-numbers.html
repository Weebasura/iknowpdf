<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Page Numbers — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    <div class="tool-hero-icon">🔢</div>
    <h1>Add Page Numbers</h1>
    <p>Automatically add page numbers to every page of your PDF.</p>
  </div>
  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <span class="drop-cta">Select PDF</span>
    </div>
    <div class="options-card" id="opts" style="display:none">
      <h3>Page Number Options</h3>
      <div class="option-group">
        <label>Position</label>
        <div class="radio-group" id="posGroup">
          <label class="radio-btn selected"><input type="radio" name="pos" value="bottom-center" checked>Bottom Center</label>
          <label class="radio-btn"><input type="radio" name="pos" value="bottom-right">Bottom Right</label>
          <label class="radio-btn"><input type="radio" name="pos" value="top-center">Top Center</label>
          <label class="radio-btn"><input type="radio" name="pos" value="top-right">Top Right</label>
        </div>
      </div>
      <div class="option-group">
        <label>Starting Number</label>
        <input type="number" id="startNum" value="1" min="1" />
      </div>
      <div class="option-group">
        <label>Format</label>
        <div class="radio-group" id="fmtGroup">
          <label class="radio-btn selected"><input type="radio" name="fmt" value="n" checked>1, 2, 3</label>
          <label class="radio-btn"><input type="radio" name="fmt" value="page-n">Page 1</label>
          <label class="radio-btn"><input type="radio" name="fmt" value="n-of-total">1 of 10</label>
        </div>
      </div>
    </div>
    <button class="btn-process" id="btnAdd" disabled>🔢 Add Page Numbers</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    let currentFile = null;
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const btnAdd = document.getElementById('btnAdd');
    const workspace = document.getElementById('workspace');

    fileInput.addEventListener('change',()=>{if(fileInput.files[0])enable(fileInput.files[0]);});
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f)enable(f);});

    document.querySelectorAll('.radio-btn').forEach(b=>b.addEventListener('click',()=>{
      const group = b.closest('.radio-group');
      group.querySelectorAll('.radio-btn').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');
    }));

    function enable(file){currentFile=file;document.getElementById('opts').style.display='block';btnAdd.disabled=false;dropZone.querySelector('h3').textContent=file.name;}

    btnAdd.addEventListener('click', async () => {
      if (!currentFile) return;
      btnAdd.textContent = 'Adding…'; btnAdd.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
        const font = await doc.embedFont(StandardFonts.Helvetica);
        const pages = doc.getPages();
        const total = pages.length;
        const startNum = parseInt(document.getElementById('startNum').value) || 1;
        const pos = document.querySelector('#posGroup .radio-btn.selected input').value;
        const fmt = document.querySelector('#fmtGroup .radio-btn.selected input').value;
        const fontSize = 11;
        const margin = 28;

        pages.forEach((page, idx) => {
          const { width, height } = page.getSize();
          const num = startNum + idx;
          let label = fmt === 'n' ? `${num}` : fmt === 'page-n' ? `Page ${num}` : `${num} of ${total}`;
          const tw = font.widthOfTextAtSize(label, fontSize);
          let x, y;
          if (pos === 'bottom-center') { x = (width - tw) / 2; y = margin; }
          else if (pos === 'bottom-right') { x = width - tw - margin; y = margin; }
          else if (pos === 'top-center') { x = (width - tw) / 2; y = height - margin; }
          else { x = width - tw - margin; y = height - margin; }
          page.drawText(label, { x, y, size: fontSize, font, color: rgb(0.3,0.3,0.3) });
        });

        const out = await doc.save();
        const blob = new Blob([out], {type:'application/pdf'});
        showResult(workspace, ()=>downloadBlob(blob,'numbered.pdf'), 'Page Numbers Added!', `${total} pages numbered · ${formatBytes(blob.size)}`);
        showToast('Done!');
      } catch(e) { showError(workspace, e.message); }
      btnAdd.textContent = '🔢 Add Page Numbers'; btnAdd.disabled = false;
    });
  </script>
</body>
</html>
