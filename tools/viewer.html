<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View PDF — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><span class="logo-mark">❖</span>I Know <span class="logo-accent">PDF</span></a>
      <a href="../index.html" class="btn-header" style="margin-left:auto">← All Tools</a>
    </div>
  </header>
  <div class="tool-hero">
    
    <div class="tool-hero-icon">👁️</div>
    <h1>View PDF</h1>
    <p>Open and read any PDF directly in your browser.</p>
  </div>

  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <span class="drop-cta">Select PDF</span>
    </div>

    <div id="viewerWrap" style="display:none;margin-top:24px">
      <div class="viewer-controls">
        <button id="btnPrev">← Prev</button>
        <span id="pageInfo">Page 1 of 1</span>
        <button id="btnNext">Next →</button>
        <button id="btnZoomOut">−</button>
        <span id="zoomInfo">100%</span>
        <button id="btnZoomIn">+</button>
      </div>
      <div id="pdf-viewer-container">
        <canvas id="pdfCanvas"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let pdfDoc = null, currentPage = 1, totalPages = 0, zoom = 1.5;
    const canvas = document.getElementById('pdfCanvas');
    const ctx = canvas.getContext('2d');
    const dropZone = document.getElementById('dropZone');
    const viewerWrap = document.getElementById('viewerWrap');

    document.getElementById('fileInput').addEventListener('change', function() { if(this.files[0]) loadFile(this.files[0]); });
    setupDropZone(dropZone, files => { if(files[0]) loadFile(files[0]); });

    async function loadFile(file) {
      const bytes = await file.arrayBuffer();
      pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
      totalPages = pdfDoc.numPages;
      currentPage = 1;
      viewerWrap.style.display = 'block';
      dropZone.querySelector('h3').textContent = file.name;
      renderPage();
    }

    async function renderPage() {
      const page = await pdfDoc.getPage(currentPage);
      const vp = page.getViewport({ scale: zoom });
      canvas.width = vp.width; canvas.height = vp.height;
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('zoomInfo').textContent = Math.round(zoom * 100) + '%';
      document.getElementById('btnPrev').disabled = currentPage <= 1;
      document.getElementById('btnNext').disabled = currentPage >= totalPages;
    }

    document.getElementById('btnPrev').addEventListener('click', () => { if(currentPage > 1) { currentPage--; renderPage(); } });
    document.getElementById('btnNext').addEventListener('click', () => { if(currentPage < totalPages) { currentPage++; renderPage(); } });
    document.getElementById('btnZoomIn').addEventListener('click', () => { zoom = Math.min(zoom + 0.25, 4); renderPage(); });
    document.getElementById('btnZoomOut').addEventListener('click', () => { zoom = Math.max(zoom - 0.25, 0.5); renderPage(); });
  </script>
</body>
</html>
