<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotate Pages — I Know PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/iknowpdf/css/style.css" />
</head>
<body class="tool-page">
  <header class="site-header">
    <div class="header-inner">
      <a href="/iknowpdf/index.html" class="logo"><span class="logo-icon">⬡</span>I Know <span class="logo-accent">PDF</span></a>
    </div>
  </header>
  <div class="tool-hero">
    <a href="/iknowpdf/index.html" class="back-link">← All Tools</a>
    <div class="tool-hero-icon">🔄</div>
    <h1>Rotate Pages</h1>
    <p>Click the rotate buttons on each page, or rotate all pages at once.</p>
  </div>

  <div class="tool-workspace" id="workspace">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <h3>Drop your PDF here</h3>
      <span class="drop-cta">Select PDF</span>
    </div>

    <div id="rotateControls" style="display:none;margin-top:24px">
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
        <button class="btn-download" onclick="rotateAll(-90)" style="font-size:13px;padding:10px 18px;background:var(--surface);color:var(--text);border:1px solid var(--border)">↺ Rotate All Left</button>
        <button class="btn-download" onclick="rotateAll(90)" style="font-size:13px;padding:10px 18px;background:var(--surface);color:var(--text);border:1px solid var(--border)">↻ Rotate All Right</button>
      </div>
    </div>

    <div class="pages-grid" id="pagesGrid" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr))"></div>
    <button class="btn-process" id="btnRotate" disabled>🔄 Save Rotated PDF</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="/iknowpdf/js/utils.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    let currentFile = null;
    const rotations = {}; // page -> accumulated rotation
    const dropZone = document.getElementById('dropZone');
    const pagesGrid = document.getElementById('pagesGrid');
    const btnRotate = document.getElementById('btnRotate');
    const workspace = document.getElementById('workspace');

    document.getElementById('fileInput').addEventListener('change', function() { if(this.files[0]) loadFile(this.files[0]); });
    setupDropZone(dropZone, files => { if(files[0]) loadFile(files[0]); });

    async function loadFile(file) {
      currentFile = file;
      pagesGrid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">Rendering pages…</p>';
      const bytes = await file.arrayBuffer();
      const pdfjs = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;
      const n = pdfjs.numPages;
      pagesGrid.innerHTML = '';
      for (let i = 1; i <= n; i++) rotations[i] = 0;

      for (let i = 1; i <= n; i++) {
        const page = await pdfjs.getPage(i);
        const vp = page.getViewport({ scale: 0.35 });
        const canvas = document.createElement('canvas');
        canvas.width = vp.width; canvas.height = vp.height;
        canvas.id = `canvas-${i}`;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

        const thumb = document.createElement('div');
        thumb.className = 'page-thumb';
        thumb.style.cursor = 'default';
        thumb.innerHTML = `
          <div class="check" style="opacity:0"></div>
          <div class="page-thumb-label" style="padding-bottom:0">Page ${i}</div>`;
        thumb.insertBefore(canvas, thumb.children[1]);

        const controls = document.createElement('div');
        controls.style.cssText = 'display:flex;gap:6px;justify-content:center;padding:8px';
        controls.innerHTML = `
          <button onclick="rotatePage(${i}, -90)" style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 10px;cursor:pointer;font-size:16px">↺</button>
          <button onclick="rotatePage(${i}, 90)" style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 10px;cursor:pointer;font-size:16px">↻</button>`;
        thumb.appendChild(controls);
        pagesGrid.appendChild(thumb);
      }
      document.getElementById('rotateControls').style.display = 'block';
      btnRotate.disabled = false;
      window._pdfjs = pdfjs;
    }

    async function rotatePage(i, deg) {
      rotations[i] = (rotations[i] + deg + 360) % 360;
      const page = await window._pdfjs.getPage(i);
      const vp = page.getViewport({ scale: 0.35, rotation: rotations[i] });
      const canvas = document.getElementById(`canvas-${i}`);
      canvas.width = vp.width; canvas.height = vp.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    }

    function rotateAll(deg) {
      const n = Object.keys(rotations).length;
      for (let i = 1; i <= n; i++) rotatePage(i, deg);
    }

    btnRotate.addEventListener('click', async () => {
      if (!currentFile) return;
      btnRotate.textContent = 'Saving…'; btnRotate.disabled = true;
      try {
        const bytes = await currentFile.arrayBuffer();
        const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
        const degrees = { 0: PDFLib.degrees(0), 90: PDFLib.degrees(90), 180: PDFLib.degrees(180), 270: PDFLib.degrees(270) };
        doc.getPages().forEach((page, idx) => {
          const rot = rotations[idx + 1] || 0;
          if (rot) page.setRotation(degrees[rot]);
        });
        const out = await doc.save();
        const blob = new Blob([out], {type:'application/pdf'});
        showResult(workspace, () => downloadBlob(blob, 'rotated.pdf'), '✅ Rotation saved!', formatBytes(blob.size));
        showToast('PDF rotated!');
      } catch(e) { showError(workspace, 'Error: ' + e.message); }
      btnRotate.textContent = '🔄 Save Rotated PDF'; btnRotate.disabled = false;
    });
  </script>
</body>
</html>
